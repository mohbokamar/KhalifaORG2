<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIF | Poverty Line Methodological Note 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kifBlue: "#002366",
            kifBlueSoft: "#103a80",
            kifGold: "#D4AF37",
            kifGoldSoft: "#f7ecd2",
            kifBg: "#f6f8fc",
            kifInk: "#16304f",
            kifSlate: "#62748a"
          },
          boxShadow: {
            soft: "0 18px 50px rgba(0,35,102,.08)",
            card: "0 12px 34px rgba(0,35,102,.08)"
          }
        }
      }
    };
  </script>

  <style>
    :root { --font-main: "Cairo", sans-serif; }
    html[lang="en"] { --font-main: "Inter", sans-serif; }

    * {
      font-family: var(--font-main);
      scroll-behavior: smooth;
      box-sizing: border-box;
    }

    body {
      background: #f6f8fc;
      color: #16304f;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,35,102,.06);
    }

    .hero-bg {
      background:
        radial-gradient(circle at top right, rgba(212,175,55,.16), transparent 26%),
        linear-gradient(135deg, #002366 0%, #00163f 100%);
    }

    .sticky-side {
      position: sticky;
      top: 110px;
      max-height: calc(100vh - 130px);
      overflow: auto;
    }

    .side-link.active {
      background: #002366;
      color: #fff;
      border-color: #D4AF37;
    }

    .copy p { line-height: 2; }
    html[lang="en"] .copy p { line-height: 1.8; }

    .num-en {
      direction: ltr;
      unicode-bidi: bidi-override;
      font-variant-numeric: lining-nums tabular-nums;
    }

    .table-wrap { -webkit-overflow-scrolling: touch; }
    .table-wrap::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-wrap::-webkit-scrollbar-thumb {
      background: #c8d2e1;
      border-radius: 999px;
    }

    .mobile-nav-open { display: flex !important; }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    @media (max-width: 1023px) {
      .sticky-side {
        position: static;
        max-height: none;
      }
    }
  </style>
</head>
<body>

  <header class="fixed inset-x-0 top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/80">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-20 py-3 flex items-center justify-between gap-3">
      <a href="#home" class="flex items-center gap-3 text-right min-w-0 flex-1 lg:flex-none">
        <img src="GoldB-Arabic.png" alt="KIF Logo" class="w-11 h-11 sm:w-12 sm:h-12 rounded-2xl object-contain bg-white shadow-sm p-1 shrink-0">
        <div class="min-w-0 text-start">
          <div id="brandName" class="font-black text-sm sm:text-lg leading-tight text-kifBlue truncate"></div>
          <div id="brandSub" class="text-[9px] sm:text-xs mt-1 font-bold tracking-[.14em] uppercase text-kifGold truncate"></div>
        </div>
      </a>

      <div class="flex items-center gap-2 shrink-0">
        <button onclick="toggleLanguage()" class="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-full border border-slate-200 bg-white text-kifBlue font-black text-sm shadow-sm">
          <span>AR</span>
          <span class="text-slate-300">/</span>
          <span>EN</span>
        </button>

        <button class="lg:hidden inline-flex items-center justify-center w-11 h-11 rounded-2xl border border-slate-200 bg-white text-kifBlue shadow-sm" onclick="toggleMobileMenu()" aria-label="menu">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <nav class="hidden lg:flex items-center gap-3">
        <a href="#home" data-nav="home" class="px-4 py-2 rounded-full font-bold text-sm text-kifBlue hover:bg-slate-100"></a>
        <a href="#summary" data-nav="summary" class="px-4 py-2 rounded-full font-bold text-sm text-kifBlue hover:bg-slate-100"></a>
        <a href="#dashboard" data-nav="dashboard" class="px-4 py-2 rounded-full font-bold text-sm text-kifBlue hover:bg-slate-100"></a>
        <a href="#methodology" data-nav="methodology" class="px-5 py-2.5 rounded-full font-black text-sm bg-kifBlue text-white shadow-soft"></a>
      </nav>
    </div>

    <nav id="mobileMenu" class="hidden lg:hidden px-4 pb-4">
      <div class="glass rounded-3xl p-3 flex flex-col gap-2 shadow-card">
        <a href="#home" onclick="closeMobileMenu()" data-mnav="home" class="px-4 py-3 rounded-2xl font-bold text-sm text-kifBlue bg-slate-50 text-start"></a>
        <a href="#summary" onclick="closeMobileMenu()" data-mnav="summary" class="px-4 py-3 rounded-2xl font-bold text-sm text-kifBlue bg-slate-50 text-start"></a>
        <a href="#dashboard" onclick="closeMobileMenu()" data-mnav="dashboard" class="px-4 py-3 rounded-2xl font-bold text-sm text-kifBlue bg-slate-50 text-start"></a>
        <a href="#methodology" onclick="closeMobileMenu()" data-mnav="methodology" class="px-4 py-3 rounded-2xl font-black text-sm bg-kifBlue text-white text-start"></a>
        <button onclick="toggleLanguage(); closeMobileMenu();" class="px-4 py-3 rounded-2xl font-black text-sm border border-slate-200 text-kifBlue text-start">AR / EN</button>
      </div>
    </nav>
  </header>

  <main class="pt-28 pb-20">
    <!-- HERO -->
    <section id="home" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 space-y-8">
      <div class="hero-bg rounded-[1.75rem] sm:rounded-[2rem] lg:rounded-[2.5rem] p-5 sm:p-8 lg:p-14 text-white shadow-soft overflow-hidden relative">
        <div class="absolute inset-0 opacity-10 bg-[linear-gradient(rgba(255,255,255,.14)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.1)_1px,transparent_1px)] bg-[size:38px_38px]"></div>

        <div class="relative grid grid-cols-1 lg:grid-cols-12 gap-10 items-center">
          <div class="lg:col-span-7">
            <div id="heroBadge" class="inline-flex items-center gap-2 bg-white/10 border border-white/15 rounded-full px-4 py-1.5 text-xs font-black mb-6"></div>
            <h1 id="heroTitle" class="text-3xl sm:text-5xl lg:text-7xl font-black leading-[1.2] sm:leading-[1.15] mb-5 sm:mb-6"></h1>
            <p id="heroDesc" class="text-base sm:text-lg lg:text-xl text-slate-200 leading-9 max-w-3xl mb-8"></p>

            <div class="flex flex-col sm:flex-row flex-wrap gap-3">
              <a href="#methodology" id="heroBtn1" class="w-full sm:w-auto px-6 py-3.5 sm:px-7 sm:py-4 rounded-2xl bg-kifGold text-kifBlue font-black shadow-soft text-center"></a>
              <a href="#dashboard" id="heroBtn2" class="w-full sm:w-auto px-6 py-3.5 sm:px-7 sm:py-4 rounded-2xl border border-white/25 bg-white/8 text-white font-black text-center"></a>
            </div>
          </div>

          <div class="lg:col-span-5">
            <div class="glass rounded-[2rem] p-6 sm:p-8 text-kifBlue shadow-soft">
              <div class="flex items-center gap-4 mb-6">
                <img src="GoldB-Arabic.png" alt="KIF Logo" class="w-16 h-16 object-contain">
                <div>
                  <div id="heroCardTitle" class="font-black text-xl text-kifBlue"></div>
                  <div id="heroCardSub" class="text-sm font-bold text-kifSlate mt-1"></div>
                </div>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="rounded-3xl bg-kifBg p-5 border border-slate-100">
                  <div class="text-xs font-black text-kifSlate mb-2" id="metric1Label"></div>
                  <div class="text-3xl font-black text-kifBlue num-en">1,250</div>
                  <div class="text-xs mt-1 text-kifSlate" id="metricFoot"></div>
                </div>
                <div class="rounded-3xl bg-kifBg p-5 border border-slate-100">
                  <div class="text-xs font-black text-kifSlate mb-2" id="metric2Label"></div>
                  <div class="text-3xl font-black text-kifBlue num-en">2,700</div>
                  <div class="text-xs mt-1 text-kifSlate" id="metricFoot2"></div>
                </div>
                <div class="rounded-3xl bg-kifBg p-5 border border-slate-100">
                  <div class="text-xs font-black text-kifSlate mb-2" id="metric3Label"></div>
                  <div class="text-3xl font-black text-kifBlue num-en">4,000</div>
                  <div class="text-xs mt-1 text-kifSlate" id="metricFoot3"></div>
                </div>
              </div>

              <div class="mt-6 rounded-3xl bg-kifBlue text-white p-5">
                <div id="methodBadge" class="text-sm font-black text-kifGold mb-1"></div>
                <p id="methodIntro" class="text-sm leading-8 text-slate-200"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 sm:gap-5" id="messageCards"></div>
    </section>

    <!-- SUMMARY -->
    <section id="summary" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
        <div class="lg:col-span-7 glass rounded-[2rem] p-8 lg:p-10 shadow-card copy">
          <div id="summaryBadge" class="text-sm font-black text-kifGold mb-3"></div>
          <h2 id="summaryTitle" class="text-3xl sm:text-4xl font-black text-kifBlue mb-6"></h2>
          <p id="summaryP1" class="text-kifSlate font-medium"></p>
          <p id="summaryP2" class="text-kifSlate font-medium mt-4"></p>

          <div class="grid md:grid-cols-2 gap-4 mt-8">
            <div class="rounded-3xl bg-kifBg border border-slate-200 p-5">
              <div id="summaryStat1Title" class="text-xs font-black text-kifGold mb-2"></div>
              <p id="summaryStat1Text" class="font-bold leading-8 text-kifInk"></p>
            </div>
            <div class="rounded-3xl bg-kifBg border border-slate-200 p-5">
              <div id="summaryStat2Title" class="text-xs font-black text-kifGold mb-2"></div>
              <p id="summaryStat2Text" class="font-bold leading-8 text-kifInk"></p>
            </div>
          </div>
        </div>

        <div class="lg:col-span-5 space-y-5">
          <div class="glass rounded-[2rem] p-6 shadow-card">
            <div id="povertyChartTitle" class="text-sm font-black text-kifGold mb-4"></div>
            <div class="h-[260px] sm:h-[300px]"><canvas id="povertyLinesChart"></canvas></div>
          </div>

          <div class="glass rounded-[2rem] p-6 shadow-card">
            <div id="historyTitle" class="text-sm font-black text-kifGold mb-4"></div>
            <ul class="space-y-4 text-sm" id="historyList"></ul>
          </div>
        </div>
      </div>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
        <div class="lg:col-span-4 space-y-6">
          <div class="glass rounded-[2rem] p-6 shadow-card">
            <div id="simTitle" class="text-sm font-black text-kifGold mb-4"></div>

            <label id="rateLabel" class="block text-xs font-black text-kifSlate mb-2"></label>
            <input id="rateInput" type="number" value="8.35" step="0.05" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 font-black text-kifBlue outline-none focus:ring-2 focus:ring-kifGold" oninput="updateSimulator()"/>

            <div class="mt-5">
              <div id="regionLabel" class="text-xs font-black text-kifSlate mb-2"></div>
              <div class="grid grid-cols-3 gap-2">
                <button class="region-btn rounded-xl bg-kifBlue text-white py-3 font-black text-sm" onclick="setRegion('west', this)" data-region="west"></button>
                <button class="region-btn rounded-xl bg-slate-100 py-3 font-black text-sm" onclick="setRegion('east', this)" data-region="east"></button>
                <button class="region-btn rounded-xl bg-slate-100 py-3 font-black text-sm" onclick="setRegion('south', this)" data-region="south"></button>
              </div>
            </div>

            <div class="mt-6 rounded-3xl bg-kifBlue text-white p-5">
              <div id="formulaBadge" class="text-xs font-black tracking-wide text-kifGold mb-2"></div>
              <p id="formulaText" class="text-sm leading-8"></p>
            </div>
          </div>

          <div class="glass rounded-[2rem] p-6 shadow-card">
            <div id="refTitle" class="text-sm font-black text-kifGold mb-4"></div>
            <div class="space-y-4">
              <div class="rounded-2xl bg-kifBg p-4 border border-slate-100">
                <div id="ref1Label" class="text-xs font-black text-kifSlate"></div>
                <div class="text-2xl font-black text-kifBlue mt-1 num-en">1.92</div>
              </div>
              <div class="rounded-2xl bg-kifBg p-4 border border-slate-100">
                <div id="ref2Label" class="text-xs font-black text-kifSlate"></div>
                <div class="text-2xl font-black text-kifBlue mt-1 num-en">67%</div>
              </div>
              <div class="rounded-2xl bg-kifBg p-4 border border-slate-100">
                <div id="ref3Label" class="text-xs font-black text-kifSlate"></div>
                <div class="text-2xl font-black text-kifBlue mt-1 num-en">478 LYD</div>
              </div>
            </div>
          </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-5">
            <div class="glass rounded-[2rem] p-6 shadow-card border-r-4 border-kifGold">
              <div id="kpi1Label" class="text-xs font-black text-kifSlate"></div>
              <div id="perPersonMonthly" class="text-4xl font-black text-kifBlue mt-2 num-en">798</div>
              <div id="kpiFoot1" class="text-xs mt-2 text-kifSlate"></div>
            </div>

            <div class="glass rounded-[2rem] p-6 shadow-card border-r-4 border-kifBlue">
              <div id="kpi2Label" class="text-xs font-black text-kifSlate"></div>
              <div id="familyMonthly" class="text-4xl font-black text-kifBlue mt-2 num-en">3,990</div>
              <div id="kpiFoot2" class="text-xs mt-2 text-kifSlate"></div>
            </div>

            <div class="glass rounded-[2rem] p-6 shadow-card border-r-4 border-slate-400">
              <div id="kpi3Label" class="text-xs font-black text-kifSlate"></div>
              <div id="perPersonDaily" class="text-4xl font-black text-kifBlue mt-2 num-en">26.6</div>
              <div id="kpiFoot3" class="text-xs mt-2 text-kifSlate"></div>
            </div>
          </div>

          <div class="grid grid-cols-1 xl:grid-cols-2 gap-5 sm:gap-6">
            <div class="glass rounded-[2rem] p-6 shadow-card">
              <div id="distributionTitle" class="text-sm font-black text-kifGold mb-4"></div>
              <div class="h-[260px] sm:h-[300px]"><canvas id="distributionChart"></canvas></div>
            </div>

            <div class="glass rounded-[2rem] p-6 shadow-card">
              <div id="cityChartTitle" class="text-sm font-black text-kifGold mb-4"></div>
              <div class="h-[260px] sm:h-[300px]"><canvas id="cityMebChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <div class="glass rounded-[2rem] p-6 sm:p-8 shadow-card">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
          <div>
            <div id="table1Badge" class="text-sm font-black text-kifGold mb-2"></div>
            <h3 id="table1Title" class="text-2xl font-black text-kifBlue"></h3>
          </div>
          <div id="table1Hint" class="text-sm text-kifSlate font-bold"></div>
        </div>
        <div class="table-wrap overflow-x-auto rounded-[1.5rem] border border-slate-200">
          <table class="min-w-[760px] w-full bg-white text-sm">
            <thead class="bg-kifBlue text-white"><tr id="table1Head"></tr></thead>
            <tbody class="font-bold text-kifInk" id="table1Body"></tbody>
          </table>
        </div>
      </div>

      <div class="glass rounded-[2rem] p-6 sm:p-8 shadow-card">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
          <div>
            <div id="table2Badge" class="text-sm font-black text-kifGold mb-2"></div>
            <h3 id="table2Title" class="text-2xl font-black text-kifBlue"></h3>
          </div>
          <div id="table2Hint" class="text-sm text-kifSlate font-bold"></div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 sm:gap-6">
          <div class="rounded-[1.5rem] border border-slate-200 overflow-hidden">
            <div id="foodTitle" class="bg-kifBlue text-white px-5 py-4 font-black"></div>
            <div id="foodGrid" class="p-4 sm:p-5 bg-white grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm font-bold text-kifInk"></div>
          </div>
          <div class="rounded-[1.5rem] border border-slate-200 overflow-hidden">
            <div id="nonFoodTitle" class="bg-kifBlue text-white px-5 py-4 font-black"></div>
            <div id="nonFoodGrid" class="p-4 sm:p-5 bg-white grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm font-bold text-kifInk"></div>
          </div>
        </div>
      </div>

      <div class="glass rounded-[2rem] p-6 sm:p-8 shadow-card">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
          <div>
            <div id="table3Badge" class="text-sm font-black text-kifGold mb-2"></div>
            <h3 id="table3Title" class="text-2xl font-black text-kifBlue"></h3>
          </div>
          <div id="table3Hint" class="text-sm text-kifSlate font-bold"></div>
        </div>
        <div class="table-wrap overflow-x-auto rounded-[1.5rem] border border-slate-200">
          <table class="min-w-[760px] w-full bg-white text-sm">
            <thead class="bg-kifBlue text-white"><tr id="table3Head"></tr></thead>
            <tbody class="font-bold text-kifInk" id="table3Body"></tbody>
          </table>
        </div>
      </div>

      <div class="glass rounded-[2rem] p-6 sm:p-8 shadow-card">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-6">
          <div>
            <div id="table4Badge" class="text-sm font-black text-kifGold mb-2"></div>
            <h3 id="table4Title" class="text-2xl font-black text-kifBlue"></h3>
          </div>
          <div id="table4Hint" class="text-sm text-kifSlate font-bold"></div>
        </div>
        <div class="table-wrap overflow-x-auto rounded-[1.5rem] border border-slate-200">
          <table class="min-w-[760px] w-full bg-white text-sm">
            <thead class="bg-kifBlue text-white"><tr id="table4Head"></tr></thead>
            <tbody class="font-bold text-kifInk" id="table4Body"></tbody>
          </table>
        </div>
      </div>

      <div class="glass rounded-[2rem] p-6 sm:p-8 shadow-card mt-8">
        <div class="mb-6">
          <div id="figure1Badge" class="text-sm font-black text-kifGold mb-2"></div>
          <h3 id="figure1Title" class="text-2xl font-black text-kifBlue"></h3>
        </div>
        <div class="h-[280px] sm:h-[360px]"><canvas id="figureOneChart"></canvas></div>
      </div>

      <div class="glass rounded-[2rem] p-6 sm:p-8 shadow-card mt-8">
        <div class="mb-6">
          <div id="figure2Badge" class="text-sm font-black text-kifGold mb-2"></div>
          <h3 id="figure2Title" class="text-2xl font-black text-kifBlue"></h3>
        </div>
        <div class="h-[280px] sm:h-[380px]"><canvas id="figureTwoChart"></canvas></div>
        <p id="figure2Note" class="text-sm leading-8 text-kifSlate font-medium mt-5"></p>
      </div>
    </section>

    <!-- METHODOLOGY -->
    <section id="methodology" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="grid lg:grid-cols-12 gap-8 lg:gap-10">
        <aside class="lg:col-span-3 hidden lg:block">
          <div class="sticky-side glass rounded-[2rem] p-4 shadow-card space-y-2">
            <div id="tocTitle" class="text-xs tracking-[.22em] uppercase text-kifSlate font-black px-3 pt-2 pb-3"></div>
            <a href="#sec-ack" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="ack"></a>
            <a href="#sec-messages" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="messages"></a>
            <a href="#sec-context" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="context"></a>
            <a href="#sec-why" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="why"></a>
            <a href="#sec-what" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="what"></a>
            <a href="#sec-use" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="use"></a>
            <a href="#sec-dynamic" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="dynamic"></a>
            <a href="#sec-annex1" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="annex1"></a>
            <a href="#sec-annex2" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="annex2"></a>
            <a href="#sec-conclusion" class="side-link block rounded-2xl border border-transparent px-4 py-3 font-bold text-sm text-kifInk" data-side="conclusion"></a>
          </div>
        </aside>

        <div class="lg:col-span-9 space-y-8 copy">
          <section id="sec-ack" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">01</div>
            <h2 id="ackTitle" class="text-3xl font-black text-kifBlue mb-5"></h2>
            <p id="ackText" class="text-kifSlate font-medium"></p>
          </section>

          <section id="sec-messages" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">02</div>
            <h2 id="msgTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <div id="methodCards" class="space-y-5"></div>
          </section>

          <section id="sec-context" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">03</div>
            <h2 id="contextTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="contextP1" class="text-kifSlate font-medium"></p>
            <p id="contextP2" class="text-kifSlate font-medium mt-4"></p>
          </section>

          <section id="sec-why" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">04</div>
            <h2 id="whyTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="whyP1" class="text-kifSlate font-medium"></p>
            <p id="whyP2" class="text-kifSlate font-medium mt-4"></p>
          </section>

          <section id="sec-what" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">05</div>
            <h2 id="whatTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="whatP1" class="text-kifSlate font-medium"></p>
            <div class="grid md:grid-cols-3 gap-4 mt-7" id="whatMetrics"></div>
          </section>

          <section id="sec-use" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">06</div>
            <h2 id="useTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="useP1" class="text-kifSlate font-medium"></p>
            <div class="grid md:grid-cols-2 gap-4 mt-6">
              <div class="rounded-3xl bg-kifBg p-5 border border-slate-200">
                <h3 id="useCard1Title" class="font-black text-kifBlue mb-2"></h3>
                <ul id="useList" class="text-kifSlate font-medium space-y-2"></ul>
              </div>
              <div class="rounded-3xl bg-kifBg p-5 border border-slate-200">
                <h3 id="useCard2Title" class="font-black text-kifBlue mb-2"></h3>
                <p id="useCard2Text" class="text-kifSlate font-medium"></p>
              </div>
            </div>
          </section>

          <section id="sec-dynamic" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">07</div>
            <h2 id="dynTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="dynP1" class="text-kifSlate font-medium"></p>
          </section>

          <section id="sec-annex1" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">08</div>
            <h2 id="annex1Title" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="annex1P1" class="text-kifSlate font-medium"></p>
            <div class="grid md:grid-cols-2 gap-4 mt-6">
              <div class="rounded-3xl bg-kifBg p-5 border border-slate-200">
                <h3 id="annex1Card1Title" class="font-black text-kifBlue mb-2"></h3>
                <p id="annex1Card1Text" class="text-kifSlate font-medium"></p>
              </div>
              <div class="rounded-3xl bg-kifBg p-5 border border-slate-200">
                <h3 id="annex1Card2Title" class="font-black text-kifBlue mb-2"></h3>
                <p id="annex1Card2Text" class="text-kifSlate font-medium"></p>
              </div>
            </div>
          </section>

          <section id="sec-annex2" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">09</div>
            <h2 id="annex2Title" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="annex2P1" class="text-kifSlate font-medium"></p>
            <div class="rounded-3xl bg-slate-950 text-white p-6 mt-6 overflow-hidden relative">
              <div class="relative z-10">
                <div id="formulaTitle2" class="text-xs font-black tracking-[.2em] uppercase text-kifGold mb-3"></div>
                <div id="formulaBox" class="text-xl sm:text-2xl font-black leading-10"></div>
              </div>
              <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_top_left,#D4AF37,transparent_35%)]"></div>
            </div>
          </section>

          <section id="sec-conclusion" class="glass rounded-[2rem] p-8 lg:p-10 shadow-card">
            <div class="text-sm font-black text-kifGold mb-3">10</div>
            <h2 id="conclusionTitle" class="text-3xl font-black text-kifBlue mb-6"></h2>
            <p id="conclusionText" class="text-kifSlate font-medium"></p>
          </section>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-slate-950 text-white py-10 mt-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="text-start">
        <div id="footerTitle" class="font-black text-xl"></div>
        <div id="footerSub" class="text-xs text-slate-400 mt-1"></div>
      </div>
      <div id="footerHint" class="text-xs text-slate-500 font-bold"></div>
    </div>
  </footer>

  <script>
    let currentLang = "ar";
    let currentRegionMultiplier = 1.0;
    let charts = {};
    const regionMap = { west: 1.0, east: 1.15, south: 1.30 };

    function qs(id) { return document.getElementById(id); }
    function setText(id, value) {
      const el = qs(id);
      if (el) el.innerHTML = value;
    }
    function formatNumber(n) {
      return new Intl.NumberFormat("en-US").format(Math.round(n));
    }

    function toggleMobileMenu() {
      qs("mobileMenu")?.classList.toggle("mobile-nav-open");
    }

    function closeMobileMenu() {
      qs("mobileMenu")?.classList.remove("mobile-nav-open");
    }

    function tableRenderer(headId, bodyId, head, rows) {
      const headEl = qs(headId);
      const bodyEl = qs(bodyId);
      if (!headEl || !bodyEl) return;

      headEl.innerHTML = head.map(h => `<th class="px-5 py-4 font-black text-start">${h}</th>`).join("");
      bodyEl.innerHTML = rows.map((row, idx) => `
        <tr class="border-b border-slate-100 ${idx % 2 ? "bg-slate-50" : "bg-white"}">
          ${row.map(cell => `<td class="px-5 py-4 ${/[0-9]/.test(String(cell)) ? "num-en" : ""}">${cell}</td>`).join("")}
        </tr>
      `).join("");
    }

    function renderCards() {
      const t = content[currentLang];

      qs("messageCards").innerHTML = t.messageCards.map(([title, text]) => `
        <div class="glass rounded-[1.6rem] p-6 shadow-card">
          <div class="text-sm font-black text-kifGold mb-2">${title}</div>
          <p class="font-bold leading-8 text-kifInk">${text}</p>
        </div>
      `).join("");

      qs("methodCards").innerHTML = t.methodMessages.map(([title, text]) => `
        <div class="rounded-3xl bg-kifBg p-5 border border-slate-200">
          <h3 class="font-black text-kifBlue mb-2">${title}</h3>
          <p class="font-medium text-kifSlate">${text}</p>
        </div>
      `).join("");

      qs("whatMetrics").innerHTML = t.whatMetrics.map(([label, value, text]) => `
        <div class="rounded-3xl bg-kifBg p-5 border border-slate-200">
          <div class="text-xs font-black text-kifSlate">${label}</div>
          <div class="text-3xl font-black text-kifBlue mt-2 num-en">${value}</div>
          <div class="text-sm font-bold text-kifSlate mt-2">${text}</div>
        </div>
      `).join("");

      qs("useList").innerHTML = t.useList.map(item => `<li>• ${item}</li>`).join("");

      qs("historyList").innerHTML = t.historyItems.map((item, i) => `
        <li class="flex items-start justify-between gap-4 ${i < t.historyItems.length - 1 ? "border-b border-slate-100 pb-3" : ""}">
          <span class="font-bold text-kifInk">${item[0]}</span>
          <span class="font-black text-kifBlue num-en">${item[1]}</span>
        </li>
      `).join("");

      qs("foodGrid").innerHTML = t.foodItems.map((item, idx) =>
        `<div class="rounded-xl bg-slate-50 p-3 ${idx === t.foodItems.length - 1 ? "sm:col-span-2" : ""}">${item}</div>`
      ).join("");

      qs("nonFoodGrid").innerHTML = t.nonFoodItems.map(item =>
        `<div class="rounded-xl bg-slate-50 p-3">${item}</div>`
      ).join("");
    }

    function applyLanguage() {
      const t = content[currentLang];

      document.documentElement.lang = currentLang;
      document.documentElement.dir = t.dir;

      setText("brandName", t.brandName);
      setText("brandSub", t.brandSub);

      document.querySelector('[data-nav="home"]').textContent = t.nav.home;
      document.querySelector('[data-nav="summary"]').textContent = t.nav.summary;
      document.querySelector('[data-nav="dashboard"]').textContent = t.nav.dashboard;
      document.querySelector('[data-nav="methodology"]').textContent = t.nav.methodology;

      document.querySelector('[data-mnav="home"]').textContent = t.nav.home;
      document.querySelector('[data-mnav="summary"]').textContent = t.nav.summary;
      document.querySelector('[data-mnav="dashboard"]').textContent = t.nav.dashboard;
      document.querySelector('[data-mnav="methodology"]').textContent = t.nav.methodology;

      [
        "heroBadge","heroTitle","heroDesc","heroBtn1","heroBtn2","heroCardTitle","heroCardSub",
        "metric1Label","metric2Label","metric3Label","metricFoot","metricFoot2","metricFoot3",
        "methodBadge","methodIntro","summaryBadge","summaryTitle","summaryP1","summaryP2",
        "summaryStat1Title","summaryStat1Text","summaryStat2Title","summaryStat2Text",
        "povertyChartTitle","historyTitle","simTitle","rateLabel","regionLabel","formulaBadge",
        "formulaText","refTitle","ref1Label","ref2Label","ref3Label","kpi1Label","kpi2Label",
        "kpi3Label","kpiFoot1","kpiFoot2","kpiFoot3","distributionTitle","cityChartTitle",
        "table1Badge","table1Title","table1Hint","table2Badge","table2Title","table2Hint",
        "foodTitle","nonFoodTitle","table3Badge","table3Title","table3Hint","table4Badge",
        "table4Title","table4Hint","figure1Badge","figure1Title","figure2Badge","figure2Title",
        "figure2Note","tocTitle","ackTitle","ackText","msgTitle","contextTitle","contextP1",
        "contextP2","whyTitle","whyP1","whyP2","whatTitle","whatP1","useTitle","useP1",
        "useCard1Title","useCard2Title","useCard2Text","dynTitle","dynP1","annex1Title",
        "annex1P1","annex1Card1Title","annex1Card1Text","annex1Card2Title","annex1Card2Text",
        "annex2Title","annex2P1","formulaTitle2","formulaBox","conclusionTitle","conclusionText",
        "footerTitle","footerSub","footerHint"
      ].forEach(id => setText(id, t[id]));

      document.querySelector('[data-region="west"]').textContent = t.regions.west;
      document.querySelector('[data-region="east"]').textContent = t.regions.east;
      document.querySelector('[data-region="south"]').textContent = t.regions.south;

      document.querySelector('[data-side="ack"]').textContent = t.side.ack;
      document.querySelector('[data-side="messages"]').textContent = t.side.messages;
      document.querySelector('[data-side="context"]').textContent = t.side.context;
      document.querySelector('[data-side="why"]').textContent = t.side.why;
      document.querySelector('[data-side="what"]').textContent = t.side.what;
      document.querySelector('[data-side="use"]').textContent = t.side.use;
      document.querySelector('[data-side="dynamic"]').textContent = t.side.dynamic;
      document.querySelector('[data-side="annex1"]').textContent = t.side.annex1;
      document.querySelector('[data-side="annex2"]').textContent = t.side.annex2;
      document.querySelector('[data-side="conclusion"]').textContent = t.side.conclusion;

      tableRenderer("table1Head","table1Body",t.table1Head,t.table1Rows);
      tableRenderer("table3Head","table3Body",t.table3Head,t.table3Rows);
      tableRenderer("table4Head","table4Body",t.table4Head,t.table4Rows);
      renderCards();
      refreshCharts();
      updateSimulator();
    }

    function toggleLanguage() {
      currentLang = currentLang === "ar" ? "en" : "ar";
      applyLanguage();
    }

    function setRegion(region, btn) {
      currentRegionMultiplier = regionMap[region];
      document.querySelectorAll(".region-btn").forEach(b => {
        b.classList.remove("bg-kifBlue","text-white");
        b.classList.add("bg-slate-100");
      });
      btn.classList.add("bg-kifBlue","text-white");
      btn.classList.remove("bg-slate-100");
      updateSimulator();
    }

    function destroyChart(id) {
      if (charts[id]) {
        try { charts[id].destroy(); } catch (e) {}
        charts[id] = null;
      }
    }

    function destroyAllCharts() {
      Object.keys(charts).forEach(key => destroyChart(key));
    }

    function updateSimulator() {
      const rate = parseFloat(qs("rateInput")?.value || "8.35");
      const daily = 15.94 * (rate / 5.0) * currentRegionMultiplier;
      const monthlyPerson = daily * 30;
      const monthlyFamily = monthlyPerson * 5;

      qs("perPersonDaily").textContent = daily.toFixed(1);
      qs("perPersonMonthly").textContent = formatNumber(monthlyPerson);
      qs("familyMonthly").textContent = formatNumber(monthlyFamily);

      updateDistributionChart(monthlyFamily);
    }

    function baseChartOptions(extra = {}) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        resizeDelay: 150,
        interaction: { mode: "nearest", intersect: false },
        animation: false,
        plugins: { legend: { display: false } },
        ...extra
      };
    }

    function makePovertyLinesChart() {
      const t = content[currentLang];
      const canvas = qs("povertyLinesChart");
      if (!canvas) return;
      destroyChart("povertyLinesChart");

      charts.povertyLinesChart = new Chart(canvas.getContext("2d"), {
        type: "bar",
        data: {
          labels: t.chartLabels.poverty,
          datasets: [{
            data: [1250, 2700, 4000],
            backgroundColor: ["#002366", "#D4AF37", "#16304f"],
            borderRadius: 14,
            maxBarThickness: 48
          }]
        },
        options: baseChartOptions({
          scales: {
            x: { grid: { display: false }, ticks: { color: "#16304f" } },
            y: { beginAtZero: true, grid: { color: "rgba(0,35,102,.08)" }, ticks: { color: "#16304f" } }
          }
        })
      });
    }

    function makeCityMebChart() {
      const t = content[currentLang];
      const canvas = qs("cityMebChart");
      if (!canvas) return;
      destroyChart("cityMebChart");

      charts.cityMebChart = new Chart(canvas.getContext("2d"), {
        type: "bar",
        data: {
          labels: t.chartLabels.city,
          datasets: [{
            data: [1077.625, 1094.8, 1228.9375],
            backgroundColor: ["#002366", "#0d2f78", "#D4AF37"],
            borderRadius: 14,
            maxBarThickness: 42
          }]
        },
        options: baseChartOptions({
          scales: {
            x: { grid: { display: false }, ticks: { color: "#16304f" } },
            y: { beginAtZero: true, grid: { color: "rgba(0,35,102,.08)" }, ticks: { color: "#16304f" } }
          }
        })
      });
    }

    function updateDistributionChart(total) {
      const t = content[currentLang];
      const canvas = qs("distributionChart");
      if (!canvas) return;
      destroyChart("distributionChart");

      charts.distributionChart = new Chart(canvas.getContext("2d"), {
        type: "doughnut",
        data: {
          labels: t.chartLabels.dist,
          datasets: [{
            data: [total * 0.40, total * 0.35, total * 0.15, total * 0.10],
            backgroundColor: ["#002366", "#D4AF37", "#16304f", "#cbd5e1"],
            borderWidth: 0
          }]
        },
        options: baseChartOptions({
          cutout: "64%",
          plugins: {
            legend: {
              position: "bottom",
              labels: { usePointStyle: true, padding: 14, boxWidth: 10, color: "#16304f" }
            }
          }
        })
      });
    }

    function makeFigureOneChart() {
      const t = content[currentLang];
      const canvas = qs("figureOneChart");
      if (!canvas) return;
      destroyChart("figureOneChart");

      charts.figureOneChart = new Chart(canvas.getContext("2d"), {
        type: "bar",
        data: {
          labels: t.chartLabels.fig1,
          datasets: [{
            data: [1250, 2750, 4000],
            backgroundColor: "#0d3f70",
            borderRadius: 10,
            maxBarThickness: 100
          }]
        },
        options: baseChartOptions({
          scales: {
            x: { grid: { display: false }, ticks: { color: "#16304f" } },
            y: { beginAtZero: true, suggestedMax: 4200, grid: { color: "rgba(0,35,102,.08)" }, ticks: { color: "#16304f" } }
          }
        })
      });
    }

    function makeFigureTwoChart() {
      const canvas = qs("figureTwoChart");
      if (!canvas) return;
      destroyChart("figureTwoChart");

      const labels = ["2019M01","2019M04","2019M07","2019M10","2020M01","2020M04","2020M07","2020M10","2021M01","2021M04","2021M07","2021M10","2022M01","2022M04","2022M07","2022M10","2023M01","2023M04","2023M07","2023M10","2024M01","2024M04","2024M07","2024M10","2025M01","2025M04"];
      const bfx = [2,-4,5,-2,8,0,9,-10,-2,1,0,2,-1,3,1,-2,4,7,13,-4,2,-16,5,3,4,8];
      const meb = [5,-1,3,-5,2,31,-1,7,-3,9,-2,0,18,-2,1,2,-1,3,-2,1,0,4,-1,2,0,8];

      charts.figureTwoChart = new Chart(canvas.getContext("2d"), {
        type: "line",
        data: {
          labels,
          datasets: [
            { label: "BFX %", data: bfx, borderColor: "#6da7e5", backgroundColor: "#6da7e5", tension: .28, pointRadius: 0, borderWidth: 2 },
            { label: "MEB %", data: meb, borderColor: "#f4a259", backgroundColor: "#f4a259", tension: .28, pointRadius: 0, borderWidth: 2 }
          ]
        },
        options: baseChartOptions({
          plugins: {
            legend: { position: "top", labels: { color: "#16304f" } }
          },
          scales: {
            x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8, color: "#16304f" }, grid: { display: false } },
            y: { min: -20, max: 35, ticks: { callback: v => v + "%", color: "#16304f" }, grid: { color: "rgba(0,35,102,.08)" } }
          }
        })
      });
    }

    function refreshCharts() {
      destroyAllCharts();
      makePovertyLinesChart();
      makeCityMebChart();
      makeFigureOneChart();
      makeFigureTwoChart();
    }

    window.addEventListener("scroll", () => {
      const sections = document.querySelectorAll("#methodology section[id]");
      let current = "";
      sections.forEach(sec => {
        if (window.scrollY >= sec.offsetTop - 160) current = sec.id;
      });
      document.querySelectorAll(".side-link").forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === `#${current}`) {
          link.classList.add("active");
        }
      });
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth >= 1024) closeMobileMenu();
      clearTimeout(window.__chartResizeTimer);
      window.__chartResizeTimer = setTimeout(() => {
        Object.values(charts).forEach(chart => {
          try { chart.resize(); } catch (e) {}
        });
      }, 120);
    });

    window.addEventListener("load", () => {
      applyLanguage();
      updateSimulator();
    });
  </script>
</body>
</html>
