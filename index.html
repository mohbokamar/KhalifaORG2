<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIF | Poverty Line Methodological Note 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kifBlue: '#002366',
            kifBlueSoft: '#103a80',
            kifGold: '#D4AF37',
            kifGoldSoft: '#f7ecd2',
            kifBg: '#f6f8fc',
            kifInk: '#16304f',
            kifSlate: '#62748a'
          },
          boxShadow: {
            soft: '0 18px 50px rgba(0,35,102,.08)',
            card: '0 12px 34px rgba(0,35,102,.08)'
          }
        }
      }
    }
  </script>
  <style>
    :root{--font-main:'Cairo',sans-serif}
    html[lang="en"]{--font-main:'Inter',sans-serif}
    *{font-family:var(--font-main);scroll-behavior:smooth}
    body{background:#f6f8fc;color:#16304f;overflow-x:hidden}
    .glass{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid rgba(0,35,102,.06)}
    .hero-bg{background:radial-gradient(circle at top right, rgba(212,175,55,.16), transparent 24%),linear-gradient(135deg,#002366 0%,#00163f 100%)}
    .side-link.active{background:#002366;color:#fff;border-color:#D4AF37}
    .copy p{line-height:2}
    .table-wrap{-webkit-overflow-scrolling:touch}
    .num-en{direction:ltr; unicode-bidi:bidi-override}
  </style>
</head>
<body>
  <header class="fixed inset-x-0 top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/80">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-20 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-kifBlue rounded-xl flex items-center justify-center text-white font-bold">KIF</div>
        <div class="hidden sm:block">
          <div id="brandName" class="font-black text-sm lg:text-lg text-kifBlue"></div>
          <div id="brandSub" class="text-[10px] font-bold text-kifGold uppercase tracking-widest"></div>
        </div>
      </div>
      
      <nav class="hidden lg:flex items-center gap-6">
        <button onclick="scrollToSection('home')" data-nav="home" class="font-bold text-sm text-kifBlue"></button>
        <button onclick="scrollToSection('summary')" data-nav="summary" class="font-bold text-sm text-kifBlue"></button>
        <button onclick="scrollToSection('dashboard')" data-nav="dashboard" class="font-bold text-sm text-kifBlue"></button>
        <button onclick="scrollToSection('methodology')" data-nav="methodology" class="px-5 py-2 bg-kifBlue text-white rounded-full text-sm font-bold"></button>
      </nav>

      <button onclick="toggleLanguage()" class="px-4 py-2 border border-slate-200 rounded-full text-xs font-black hover:bg-slate-50">AR / EN</button>
    </div>
  </header>

  <main class="pt-28 pb-20">
    <section id="home" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="hero-bg rounded-[2.5rem] p-8 lg:p-16 text-white shadow-soft relative overflow-hidden">
        <div class="relative z-10 grid lg:grid-cols-12 gap-12 items-center">
          <div class="lg:col-span-7">
            <span id="heroBadge" class="inline-block px-4 py-1.5 bg-white/10 border border-white/20 rounded-full text-xs font-bold mb-6"></span>
            <h1 id="heroTitle" class="text-4xl lg:text-6xl font-black mb-6 leading-tight"></h1>
            <p id="heroDesc" class="text-lg text-slate-200 mb-8 max-w-2xl"></p>
            <div class="flex gap-4">
              <button onclick="scrollToSection('methodology')" id="heroBtn1" class="px-8 py-4 bg-kifGold text-kifBlue font-black rounded-2xl shadow-lg"></button>
              <button onclick="scrollToSection('dashboard')" id="heroBtn2" class="px-8 py-4 bg-white/10 border border-white/20 text-white font-black rounded-2xl"></button>
            </div>
          </div>
          <div class="lg:col-span-5 glass rounded-3xl p-8 text-kifBlue">
            <div id="heroCardTitle" class="text-xl font-black mb-6 border-b border-slate-100 pb-4"></div>
            <div class="space-y-6">
              <div class="flex justify-between items-end">
                <span id="metric1Label" class="text-sm font-bold text-kifSlate"></span>
                <span class="text-2xl font-black num-en">1,250 <small class="text-xs">LYD</small></span>
              </div>
              <div class="flex justify-between items-end">
                <span id="metric2Label" class="text-sm font-bold text-kifSlate"></span>
                <span class="text-2xl font-black num-en">2,700 <small class="text-xs">LYD</small></span>
              </div>
              <div class="mt-6 p-4 bg-kifBlue rounded-2xl text-white">
                <p id="methodIntro" class="text-xs leading-relaxed opacity-90"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="dashboard" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div class="grid lg:grid-cols-3 gap-8">
        <div class="glass rounded-3xl p-8 shadow-card">
          <h3 id="simTitle" class="text-lg font-black text-kifBlue mb-6"></h3>
          <div class="space-y-6">
            <div>
              <label id="rateLabel" class="block text-xs font-black text-kifSlate mb-3 uppercase tracking-wider"></label>
              <input type="number" id="rateInput" value="8.35" step="0.05" oninput="updateSimulator()" 
                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black text-kifBlue outline-none focus:border-kifGold">
            </div>
            <div>
              <label id="regionLabel" class="block text-xs font-black text-kifSlate mb-3 uppercase tracking-wider"></label>
              <div class="grid grid-cols-3 gap-2">
                <button onclick="setRegion('west', this)" class="region-btn p-3 rounded-xl bg-kifBlue text-white text-xs font-black transition-all">West</button>
                <button onclick="setRegion('east', this)" class="region-btn p-3 rounded-xl bg-slate-100 text-kifBlue text-xs font-black transition-all">East</button>
                <button onclick="setRegion('south', this)" class="region-btn p-3 rounded-xl bg-slate-100 text-kifBlue text-xs font-black transition-all">South</button>
              </div>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2 grid sm:grid-cols-3 gap-6">
          <div class="glass rounded-3xl p-6 border-b-4 border-kifGold">
            <span id="kpi1Label" class="text-xs font-black text-kifSlate"></span>
            <div id="perPersonMonthly" class="text-3xl font-black text-kifBlue mt-4 num-en"></div>
            <span class="text-[10px] font-bold text-kifSlate mt-2 block">LYD / Month</span>
          </div>
          <div class="glass rounded-3xl p-6 border-b-4 border-kifBlue">
            <span id="kpi2Label" class="text-xs font-black text-kifSlate"></span>
            <div id="familyMonthly" class="text-3xl font-black text-kifBlue mt-4 num-en"></div>
            <span class="text-[10px] font-bold text-kifSlate mt-2 block">LYD / Month</span>
          </div>
          <div class="glass rounded-3xl p-6 border-b-4 border-slate-300">
            <span id="kpi3Label" class="text-xs font-black text-kifSlate"></span>
            <div id="perPersonDaily" class="text-3xl font-black text-kifBlue mt-4 num-en"></div>
            <span class="text-[10px] font-bold text-kifSlate mt-2 block">LYD / Day</span>
          </div>
          
          <div class="sm:col-span-3 glass rounded-3xl p-8 h-[400px]">
             <canvas id="povertyChart"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-kifBlue text-white py-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p id="footerTitle" class="font-black text-lg mb-2"></p>
      <p id="footerSub" class="text-sm opacity-60"></p>
    </div>
  </footer>

  <script>
    const content = {
      ar: {
        dir: 'rtl',
        brandName: 'مؤسسة خليفة الدولية للأعمال الإنسانية',
        brandSub: 'بوابة المنهجية والأبحاث الاستراتيجية',
        nav: { home:'الرئيسية', summary:'الملخص', dashboard:'البيانات', methodology:'المذكرة الكاملة' },
        heroBadge: 'تحديث مارس 2026',
        heroTitle: 'منهجية <span class="text-kifGold">خط الفقر</span> في ليبيا',
        heroDesc: 'تحليل ديناميكي لسلة الاحتياجات الأساسية وتكلفة المعيشة لعام 2026، مصمم لدعم صناع القرار والمنظمات الإنسانية.',
        heroBtn1: 'تصفح المذكرة', heroBtn2: 'لوحة البيانات',
        heroCardTitle: 'مؤشرات العتبة الاقتصادية',
        metric1Label:'الفقر المدقع (أسرة)', metric2Label:'الفقر المطلق (أسرة)',
        methodIntro:'تعتمد الحسابات على سلة MEB المحدثة ربع سنويًا بناءً على أسعار السوق الموازي والتضخم.',
        simTitle: 'محاكي خط الفقر الدولي',
        rateLabel: 'سعر صرف الدولار (موازي)',
        regionLabel: 'المنطقة الجغرافية',
        kpi1Label: 'احتياج الفرد شهرياً',
        kpi2Label: 'احتياج الأسرة (5 أفراد)',
        kpi3Label: 'خط الفقر اليومي للفرد',
        footerTitle: 'مؤسسة خليفة الدولية للأعمال الإنسانية',
        footerSub: 'حقوق النشر © 2026 - قسم السياسات'
      },
      en: {
        dir: 'ltr',
        brandName: 'Khalifa International Foundation',
        brandSub: 'Strategic Research & Methodology Portal',
        nav: { home:'Home', summary:'Summary', dashboard:'Data', methodology:'Full Note' },
        heroBadge: 'March 2026 Update',
        heroTitle: '<span class="text-kifGold">Poverty Line</span> Methodology in Libya',
        heroDesc: 'Dynamic analysis of the Minimum Expenditure Basket (MEB) and 2026 cost of living benchmarks.',
        heroBtn1: 'Read Note', heroBtn2: 'Data Board',
        heroCardTitle: 'Economic Threshold Indicators',
        metric1Label:'Extreme Poverty (Family)', metric2Label:'Absolute Poverty (Family)',
        methodIntro:'Calculations are based on the quarterly updated MEB indexed to parallel market rates.',
        simTitle: 'International Line Simulator',
        rateLabel: 'USD Exchange Rate (Parallel)',
        regionLabel: 'Geographic Region',
        kpi1Label: 'Monthly Per Capita',
        kpi2Label: 'Monthly Per Family (5)',
        kpi3Label: 'Daily Per Capita Line',
        footerTitle: 'Khalifa International Foundation',
        footerSub: 'Copyright © 2026 - Policy Dept.'
      }
    };

    let currentLang = 'ar';
    let currentRegion = 'west';
    let myChart = null;

    function toggleLanguage() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      document.documentElement.lang = currentLang;
      document.documentElement.dir = content[currentLang].dir;
      updateUI();
    }

    function updateUI() {
      const c = content[currentLang];
      document.getElementById('brandName').innerText = c.brandName;
      document.getElementById('brandSub').innerText = c.brandSub;
      document.getElementById('heroBadge').innerText = c.heroBadge;
      document.getElementById('heroTitle').innerHTML = c.heroTitle;
      document.getElementById('heroDesc').innerText = c.heroDesc;
      document.getElementById('heroBtn1').innerText = c.heroBtn1;
      document.getElementById('heroBtn2').innerText = c.heroBtn2;
      document.getElementById('heroCardTitle').innerText = c.heroCardTitle;
      document.getElementById('metric1Label').innerText = c.metric1Label;
      document.getElementById('metric2Label').innerText = c.metric2Label;
      document.getElementById('methodIntro').innerText = c.methodIntro;
      document.getElementById('simTitle').innerText = c.simTitle;
      document.getElementById('rateLabel').innerText = c.rateLabel;
      document.getElementById('regionLabel').innerText = c.regionLabel;
      document.getElementById('kpi1Label').innerText = c.kpi1Label;
      document.getElementById('kpi2Label').innerText = c.kpi2Label;
      document.getElementById('kpi3Label').innerText = c.kpi3Label;
      document.getElementById('footerTitle').innerText = c.footerTitle;
      document.getElementById('footerSub').innerText = c.footerSub;

      Object.keys(c.nav).forEach(k => {
        const el = document.querySelector(`[data-nav="${k}"]`);
        if(el) el.innerText = c.nav[k];
      });

      updateSimulator();
    }

    function updateSimulator() {
      const rate = parseFloat(document.getElementById('rateInput').value) || 8.35;
      let factor = currentRegion === 'west' ? 1.0 : (currentRegion === 'east' ? 1.05 : 1.15);
      
      // Equation: $Daily = 15.94 \times (Rate / 5.00) \times Factor$
      const daily = 15.94 * (rate / 5.0) * factor;
      const monthlyPerson = daily * 30;
      const monthlyFamily = monthlyPerson * 5;

      document.getElementById('perPersonDaily').innerText = daily.toFixed(2);
      document.getElementById('perPersonMonthly').innerText = Math.round(monthlyPerson).toLocaleString();
      document.getElementById('familyMonthly').innerText = Math.round(monthlyFamily).toLocaleString();
      
      renderChart(monthlyFamily);
    }

    function setRegion(reg, btn) {
      currentRegion = reg;
      document.querySelectorAll('.region-btn').forEach(b => {
        b.classList.replace('bg-kifBlue', 'bg-slate-100');
        b.classList.replace('text-white', 'text-kifBlue');
      });
      btn.classList.replace('bg-slate-100', 'bg-kifBlue');
      btn.classList.replace('text-kifBlue', 'text-white');
      updateSimulator();
    }

    function renderChart(intlLine) {
      const ctx = document.getElementById('povertyChart').getContext('2d');
      if (myChart) myChart.destroy();
      
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: currentLang === 'ar' ? ['المدقع', 'المطلق', 'الدولي (المحاكي)'] : ['Extreme', 'Absolute', 'Intl (Simulated)'],
          datasets: [{
            label: 'LYD / Month',
            data: [1250, 2700, intlLine],
            backgroundColor: ['#62748a', '#103a80', '#D4AF37'],
            borderRadius: 12
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, grid: { display: false } } }
        }
      });
    }

    function scrollToSection(id) {
      const el = document.getElementById(id);
      if(el) window.scrollTo({ top: el.offsetTop - 100, behavior: 'smooth' });
    }

    window.onload = updateUI;
  </script>
</body>
</html>
